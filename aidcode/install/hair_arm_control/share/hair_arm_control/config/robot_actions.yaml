# 底盘控制参数
chassis:
  max_linear_velocity: 0.5       # m/s
  max_angular_velocity: 1.0      # rad/s
  max_linear_acceleration: 1.0   # m/s²
  max_angular_acceleration: 2.0  # rad/s²
  control_period: 0.05            # 20 Hz

